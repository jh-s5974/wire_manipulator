# Wire Manipulator 설정
# ─────────────────────────────────────────────────────────────────────────────
# 조인트 순서 (0~4):
#   joint0: base_yaw   (revolute,  RobStride03 0x01, CAN0)
#   joint1: pitch       (revolute,  RobStride03 0x02, CAN0)
#   joint2: lower_link  (prismatic, MyActuatorX6 0x03, CAN0, ball screw)
#   joint3: elbow_pitch (revolute,  MyActuatorX6 0x04+0x05, CAN1, wire)
#   joint4: upper_link  (prismatic, MyActuatorX6 0x06+0x07, CAN1, wire)
#
# 모터→CAN 버스: m01,m02,m03 → CAN0 / m04,m05,m06,m07 → CAN1
# 모터 명령 모드(GUI "모터 뷰"): joint IK/와이어 텐션 커플링을 우회하고
# 물리 모터(m01~m07)에 raw 위치 명령을 직접 전송 (gui/motor_raw_mode)
# ─────────────────────────────────────────────────────────────────────────────

gui/control_password: 1234

# 명령 보간 시간 [s] — GUI에서 보내는 duration을 이 값으로 강제 적용
# 0.0  : 즉시 이동 (끄떡거림 없음, 권장)
# 음수 : yaml 무시하고 GUI 값 그대로 사용
# 양수 : 해당 초만큼 보간 (중력 하중 큰 관절에서 끄떡거림 발생 주의)
ws_bridge.default_duration_sec: -1.0

# CAN 포트
can0.port: can2
can1.port: can1

# 모터 회전 방향 보정 (실 하드웨어용) — 실제 배선/장착 방향에 맞춰 +1 또는 -1.
# can_bus0.h/can_bus1.h 에서 모터 상태를 읽고 명령을 보낼 때 적용됨.
motor_direction_sign:
- 1.0   # m01: base_yaw   (RobStride03 0x01)
- 1.0   # m02: pitch      (RobStride03 0x02)
- 1.0   # m03: lower_link (MyActuatorX6 0x03)
- 1.0   # m04: elbow A, 장력 (MyActuatorX6 0x04)
- 1.0   # m05: elbow B, 위치 (MyActuatorX6 0x05)
- 1.0   # m06: upper A    (MyActuatorX6 0x06)
- 1.0   # m07: upper B    (MyActuatorX6 0x07)

# ── MuJoCo 시뮬레이션 ──
mujoco.model_path: mjcf/manipulator.xml
control_dt: 0.005
physics_dt: 0.001
cutoff_freq: 200.0

# 중력 보상 — true: qfrc_bias를 피드포워드로 자동 적용 (시뮬레이션용)
# 실하드웨어에서는 별도 중력 모델 필요
gravity_compensation: true

# MJCF 조인트 이름 (index 0~4 가 joint0~joint4 에 대응)
joints:
- yaw1    # joint0: base_yaw
- pitch1  # joint1: shoulder_pitch
- pris1   # joint2: lower_link (prismatic)
- pitch2  # joint3: elbow_pitch
- pris2   # joint4: upper_link (prismatic)

# PD 제어 게인 (joint0~4)
joint_kp:
- 100.0   # joint0: base_yaw
- 100.0   # joint1: pitch
- 200.0   # joint2: lower_link (ball screw)
- 80.0    # joint3: elbow_pitch (wire)
- 80.0    # joint4: upper_link (wire)

joint_kd:
- 3.0     # joint0: base_yaw
- 3.0     # joint1: pitch
- 4.0     # joint2: lower_link (ball screw)
- 2.5     # joint3: elbow_pitch (wire)
- 2.5     # joint4: upper_link (wire)

# 액추에이터 포화 한계 [Nm / N] — 시뮬레이션에서 토크 클램프에 사용
effort_limits:
- 100.0   # joint0: base_yaw
- 100.0   # joint1: pitch
- 500.0   # joint2: lower_link (ball screw, 선형 힘 [N])
- 100.0   # joint3: elbow_pitch (wire)
- 500.0   # joint4: upper_link (wire, 선형 힘 [N])

# 초기 위치 (joint0~4)
default_joint_positions:
- 0.0     # joint0: base_yaw [rad]
- 0.0     # joint1: pitch [rad]
- 0.0     # joint2: lower_link [m]
- 0.0     # joint3: elbow_pitch [rad]
- 0.0     # joint4: upper_link [m]

# ─────────────────────────────────────────────────────────────────────────────
# 세이프티 레이어 파라미터
# 조인트 위치 한계: URDF 기반 (joint0~4)
# ─────────────────────────────────────────────────────────────────────────────

# 조인트 위치 하한 [rad / m]
safety_layer.joint_pos_limit_lower:
- -2.094395  # joint0: base_yaw   (±120 deg)
-  0.0       # joint1: pitch      (0 deg, URDF lower limit)
-  0.0       # joint2: lower_link (0 mm)
-  0.0       # joint3: elbow_pitch (0 deg, URDF lower limit)
-  0.0       # joint4: upper_link  (0 mm)

# 조인트 위치 상한 [rad / m]
safety_layer.joint_pos_limit_upper:
- 2.094395  # joint0: base_yaw   (±120 deg)
- 1.570796  # joint1: pitch      (+90 deg)
- 0.09      # joint2: lower_link (90 mm)
- 1.570796  # joint3: elbow_pitch (+90 deg)
- 0.09      # joint4: upper_link  (90 mm)

# 조인트 속도 한계 [rad/s 또는 m/s]
safety_layer.joint_vel_limit: 30.0

# 조인트 토크/힘 한계 [Nm 또는 N]
safety_layer.joint_torque_limit: 30.0

# 온도 한계 [°C]
safety_layer.joint_temp_limit_c: 95.0

# 위치 한계 허용 오차 [rad / m]
# 시뮬: 0.002 (부동소수점 드리프트 흡수), 실하드웨어: 0.001
safety_layer.pos_tolerance: 0.002

# 명령 타임아웃 [s]
safety_layer.cmd_timeout_sec: 1.0

# 상태 타임아웃 [s]
safety_layer.state_timeout_sec: 1.0

# 명령 클램프 한계
safety_layer.cmd_pos_limit: 10.0
safety_layer.cmd_vel_limit: 30.0
safety_layer.cmd_torque_limit: 30.0
safety_layer.cmd_kp_limit: 600.0
safety_layer.cmd_kd_limit: 5.0

# LOCK 모드 홀드 게인
safety_layer.lock_kp: 100.0
safety_layer.lock_kd: 3.0

# LOCK → MANUAL 복구 시간 [s]
safety_layer.restore_duration_sec: 10.0
