manipulator_controller:
  # Publish all joint states -----------------------------------
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50

  # Position Controllers --------------------------------------
  yaw1_position_controller:
    type: effort_controllers/JointPositionController
    joint: yaw1
    pid: {p: 100.0, i: 0.01, d: 10.0}
  br_position_controller:
    type: effort_controllers/JointPositionController
    joint: br
    pid: {p: 100.0, i: 0.01, d: 10.0}
  fr_position_controller:
    type: effort_controllers/JointPositionController
    joint: fr
    pid: {p: 100.0, i: 0.01, d: 10.0}
  bl_position_controller:
    type: effort_controllers/JointPositionController
    joint: bl
    pid: {p: 100.0, i: 0.01, d: 10.0}
  fl_position_controller:
    type: effort_controllers/JointPositionController
    joint: fl
    pid: {p: 100.0, i: 0.01, d: 10.0}
  pitch1_position_controller:
    type: effort_controllers/JointPositionController
    joint: pitch1
    pid: {p: 100.0, i: 0.01, d: 10.0}
  pris1_position_controller:
    type: effort_controllers/JointPositionController
    joint: pris1
    pid: {p: 100.0, i: 0.01, d: 10.0}
  pitch2_position_controller:
    type: effort_controllers/JointPositionController
    joint: pitch2
    pid: {p: 100.0, i: 0.01, d: 10.0}
  pitch3_position_controller:
    type: effort_controllers/JointPositionController
    joint: pitch3
    pid: {p: 100.0, i: 0.01, d: 10.0}
  pitch4_position_controller:
    type: effort_controllers/JointPositionController
    joint: pitch4
    pid: {p: 100.0, i: 0.01, d: 10.0}
  pitch5_position_controller:
    type: effort_controllers/JointPositionController
    joint: pitch5
    pid: {p: 100.0, i: 0.01, d: 10.0}
  pris2_position_controller:
    type: effort_controllers/JointPositionController
    joint: pris2
    pid: {p: 100.0, i: 0.01, d: 10.0}
